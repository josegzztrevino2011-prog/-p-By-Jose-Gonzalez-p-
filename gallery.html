<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diabetes Image Gallery</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* 🔥 Loading Screen */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.spinner {
  width:60px;
  height:60px;
  border:6px solid #1e293b;
  border-top:6px solid #60a5fa;
  border-radius:50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Nav */
nav {
  background:#020617;
  padding:15px;
  text-align:center;
}

nav a {
  color:#60a5fa;
  margin:20px;
  text-decoration:none;
}

/* Gallery */
.gallery {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap:20px;
  padding:30px;
}

/* Images */
.gallery img {
  width:100%;
  border-radius:10px;
  transition:0.3s;
}

.gallery img:hover {
  transform:scale(1.05);
}
</style>
</head>

<body>

<!-- Loading -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- Nav -->
<nav>
  <a href="index.html">Information</a>
  <a href="graphs.html">Statistics</a>
  <a href="quiz.html">Quiz</a>
  <a href="gallery.html">Gallery</a>
</nav>

<h1 style="text-align:center;">📸 Diabetes Image Gallery</h1>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5">
<img src="https://images.unsplash.com/photo-1579154204601-01588f351e67">
<img src="https://images.unsplash.com/photo-1505751172876-fa1923c5c528">
<img src="https://images.unsplash.com/photo-1554284126-aa88f22d8b74">
<img src="https://images.unsplash.com/photo-1580281657527-47e3a9c4f58d">
<img src="https://images.unsplash.com/photo-1597764690523-15bea4c581c9">

</div>

<script>
// loader
window.onload = () => {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
  }, 1500);
};
</script>

</body>
</html>
